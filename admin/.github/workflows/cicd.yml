name: Deploy AI Tool Hub Frontend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      
jobs:
  ci:
    name: Build (CI)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Create .env file
      run: |
        echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> .env
        echo "VITE_ENV=${{ secrets.VITE_ENV }}" >> .env
        echo "VITE_S3_ENDPOINT=${{ secrets.VITE_S3_ENDPOINT }}" >> .env
        echo "VITE_S3_ACCESS_KEY=${{ secrets.VITE_S3_ACCESS_KEY }}" >> .env
        echo "VITE_S3_SECRET_KEY=${{ secrets.VITE_S3_SECRET_KEY }}" >> .env
        echo "VITE_S3_BUCKET=${{ secrets.VITE_S3_BUCKET }}" >> .env
        echo "VITE_S3_REGION=${{ secrets.VITE_S3_REGION }}" >> .env


    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: vite-dist
        path: dist
        retention-days: 1

  cd:
    name: Deploy to Server (CD)
    needs: ci
    runs-on: ubuntu-latest

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: vite-dist
        path: dist

    - name: Clean old build folder
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.HOST_NAME }}
        username: root
        port: 22
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          rm -rf /var/www/ai-tool-hub.getprixite.com/*

    - name: Copy dist contents to server via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.HOST_NAME }}
        username: root
        port: 22
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: dist/**
        target: /var/www/ai-tool-hub.getprixite.com/
        strip_components: 1

    - name: Restart Nginx on server
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.HOST_NAME }}
        username: root
        port: 22
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          nginx -t && systemctl restart nginx
